<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MACUIN - Intranet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .sidebar { min-height: 100vh; background-color: #343a40; }
        .sidebar a { color: #c2c7d0; text-decoration: none; padding: 10px 15px; display: block; border-radius: 5px; margin-bottom: 5px;}
        .sidebar a:hover, .sidebar a.active { background-color: #007bff; color: white; }
        .content { padding: 20px; }
    </style>
</head>
<body>
    <div class="d-flex">
        <div class="sidebar p-3" style="width: 250px;">
            <h4 class="text-white text-center mb-4"><i class="bi bi-tools"></i> MACUIN</h4>
            <nav>
                <a href="/dashboard"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                <a href="/inventario"><i class="bi bi-box-seam me-2"></i> Almacén</a>
                <a href="/pedidos"><i class="bi bi-truck me-2"></i> Logística y Ventas</a>
                <hr class="text-secondary">
                <a href="/"><i class="bi bi-box-arrow-left me-2"></i> Cerrar Sesión</a>
            </nav>
        </div>

        <div class="flex-grow-1 content">
            {% block content %}{% endblock %}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
