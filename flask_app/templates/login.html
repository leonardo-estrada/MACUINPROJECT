<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - MACUIN</title>
  <link rel="stylesheet" href="CSS/login.css" />
</head>
<body>
  <div class="login-page">
    <div class="logo-section">
      <img src="IMG/logo2.png" alt="Logo MACUIN" class="logo-img">
    
      <p>Sistema de Gestión de Autopartes</p>
    </div>

    <div class="login-card">
      <div class="card-header">
        <h2>Iniciar Sesión</h2>
        <p>Sistema de Gestión de Autopartes</p>
      </div>

      <form>
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input type="email" id="email" placeholder="Correo" />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input type="password" id="password" placeholder="••••••••" />
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" />
            <span>Recordarme</span>
          </label>

          <a href="Passowrd.html" class="forgot-password">¿Olvidó su contraseña?</a>
        </div>

        <a href="autopartes.html" class="login-btn">
  <span class="btn-icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="5" y1="12" x2="19" y2="12"/>
      <polyline points="12 5 19 12 12 19"/>
    </svg>
  </span>
  <span>Iniciar Sesión</span>
</a>
      </form>

      <p class="footer-text">
        El rol se asigna automáticamente según sus credenciales.
      </p>
    </div>
  </div>
</body>
</html>
