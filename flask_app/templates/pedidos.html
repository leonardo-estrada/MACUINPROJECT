{% extends "layout.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Logística y Ventas</h2>
    <div class="input-group w-25">
        <input type="text" class="form-control" placeholder="Buscar pedido #...">
        <button class="btn btn-outline-secondary" type="button">Buscar</button>
    </div>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <ul class="nav nav-tabs mb-3" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="pendientes-tab" data-bs-toggle="tab" data-bs-target="#pendientes" type="button">Por Despachar</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="enviados-tab" data-bs-toggle="tab" data-bs-target="#enviados" type="button">En Tránsito</button>
            </li>
        </ul>
        <div class="tab-content">
            <div class="tab-pane fade show active" id="pendientes">
                <table class="table">
                    <thead>
                        <tr>
                            <th># Orden</th>
                            <th>Cliente</th>
                            <th>Fecha</th>
                            <th>Total</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>ORD-9921</td>
                            <td>Taller Mecánico "El Tuercas"</td>
                            <td>2026-03-04</td>
                            <td>$3,450.00</td>
                            <td><span class="badge bg-warning text-dark">Pendiente</span></td>
                            <td><button class="btn btn-sm btn-success">Generar Guía</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="tab-pane fade" id="enviados">
                <p class="text-muted mt-3">No hay pedidos en tránsito en este momento.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
